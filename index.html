<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Grimoire Sacré — L'aventure d'Eldrin le Sorcier</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 20px;
    background: linear-gradient(135deg, #0a0a0f 0%, #1a0a2a 100%);
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  h1 {
    margin: 0 0 8px 0;
    color: #f4c430;
    font-family: 'Georgia', serif;
    font-size: 32px;
    text-shadow: 0 0 20px rgba(244, 196, 48, 0.3);
  }
  .subtitle {
    margin: 0 0 16px 0;
    color: #9b6dd4;
    font-style: italic;
  }
  #game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(0, 0, 0, 0.4);
    padding: 16px;
    border-radius: 16px;
    border: 1px solid rgba(244, 196, 48, 0.2);
    box-shadow: 0 0 40px rgba(244, 196, 48, 0.15);
  }
  canvas {
    background: #000;
    border-radius: 8px;
    display: block;
    outline: none;
  }
  .controls-bar {
    display: flex;
    gap: 12px;
    margin-top: 12px;
    align-items: center;
  }
  button {
    padding: 8px 16px;
    font-size: 13px;
    background: transparent;
    border: 1px solid rgba(244, 196, 48, 0.5);
    border-radius: 6px;
    cursor: pointer;
    color: #e0e0e0;
    transition: all 0.2s;
  }
  button:hover {
    border-color: #f4c430;
    color: #f4c430;
    background: rgba(244, 196, 48, 0.1);
  }
  #save-status {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5);
  }
  .help {
    margin-top: 16px;
    font-size: 13px;
    color: rgba(255, 255, 255, 0.6);
    text-align: center;
    line-height: 1.6;
    max-width: 800px;
  }
  .help b { color: #7fdbff; }
  .virtual-controls {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 16px;
    align-items: center;
  }
  .movement {
    display: grid;
    grid-template-columns: 50px 50px 50px;
    grid-template-rows: 50px 50px 50px;
    gap: 4px;
    justify-items: center;
  }
  .movement button {
    width: 50px;
    height: 50px;
    padding: 0;
    font-size: 20px;
  }
  #up-btn { grid-column: 2; grid-row: 1; }
  #left-btn { grid-column: 1; grid-row: 2; }
  #down-btn { grid-column: 2; grid-row: 3; }
  #right-btn { grid-column: 3; grid-row: 2; }
  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .actions button {
    min-width: 60px;
  }
  .input-controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #virtual-input {
    padding: 8px;
    font-size: 16px;
    width: 150px;
  }
</style>
</head>
<body>
<h1>Le Grimoire Sacré</h1>
<p class="subtitle">L'aventure d'Eldrin le Sorcier</p>
<div id="game-wrapper">
  <canvas id="game" width="800" height="500" tabindex="0"></canvas>
  <div class="controls-bar">
    <button id="reset-btn">Recommencer la partie</button>
    <span id="save-status">Chargement...</span>
  </div>
</div>
<div class="virtual-controls">
  <div class="movement">
    <button id="up-btn">↑</button>
    <button id="left-btn">←</button>
    <button id="down-btn">↓</button>
    <button id="right-btn">→</button>
  </div>
  <div class="actions">
    <button id="space-btn">Action</button>
    <button id="spell1-btn">1</button>
    <button id="spell2-btn">2</button>
    <button id="spell3-btn">3</button>
    <button id="hub-btn">H</button>
    <button id="esc-btn">Esc</button>
  </div>
  <div class="input-controls">
    <input type="text" id="virtual-input" placeholder="Réponse" />
    <button id="enter-btn">Entrée</button>
  </div>
</div>
<div class="help">
  Utilisez les contrôles virtuels ci-dessous ou le clavier ·
  <b>Flèches</b> = bouger ·
  <b>Action</b> = interagir ·
  <b>1/2/3</b> = changer de sort ·
  <b>Champ réponse + Entrée</b> = répondre aux questions ·
  <b>H</b> = retour au hub ·
  <b>Esc</b> = fuir
</div>
<script>
(function(){
const cv=document.getElementById('game'),ctx=cv.getContext('2d');
const saveStatus=document.getElementById('save-status');
const resetBtn=document.getElementById('reset-btn');
cv.focus();cv.addEventListener('click',()=>cv.focus());

// ---------- ÉTAT ----------
const DEFAULT_STATE=()=>({scene:'intro',introStep:0,player:{x:400,y:250,hp:10,maxHp:10,anim:0},
killsByLevel:{foret:0,chateau:0,montagne:0},spells:['feu'],
currentLevel:null,enemies:[],particles:[],
combat:null,
input:'',message:'',messageTime:0,
keys:{},nearSign:null,
levelProgress:{foret:false,chateau:false,montagne:false},
finalBoss:null,bossDefeated:false});

let STATE=DEFAULT_STATE();

// ---------- SAUVEGARDE (localStorage) ----------
const SAVE_KEY='wizard_game_save_v2';
let saveTimer=null;

function saveGame(){
  const data={
    scene:STATE.scene==='intro'?'intro':(STATE.scene==='gameover'||STATE.scene==='victory'?'hub':STATE.scene),
    introStep:STATE.introStep,
    player:{hp:STATE.player.hp,maxHp:STATE.player.maxHp,x:STATE.scene==='hub'?STATE.player.x:400,y:STATE.scene==='hub'?STATE.player.y:400},
    killsByLevel:STATE.killsByLevel,
    spells:STATE.spells,
    levelProgress:STATE.levelProgress,
    bossDefeated:STATE.bossDefeated,
    currentLevel:STATE.currentLevel
  };
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify(data));
    saveStatus.textContent='✓ Sauvegardé';
    saveStatus.style.color='#52c878';
    setTimeout(()=>{saveStatus.textContent='Progression sauvegardée';saveStatus.style.color='rgba(255,255,255,0.5)';},1500);
  }catch(err){
    saveStatus.textContent='⚠ Sauvegarde indisponible';
    saveStatus.style.color='#e24b4a';
  }
}

function scheduleSave(){
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(saveGame,500);
}

function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(raw){
      const data=JSON.parse(raw);
      STATE.introStep=data.introStep||0;
      STATE.player.hp=(data.player&&data.player.hp!==undefined)?data.player.hp:10;
      STATE.player.maxHp=(data.player&&data.player.maxHp!==undefined)?data.player.maxHp:10;
      STATE.killsByLevel=data.killsByLevel||{foret:0,chateau:0,montagne:0};
      STATE.spells=data.spells||['feu'];
      STATE.levelProgress=data.levelProgress||{foret:false,chateau:false,montagne:false};
      STATE.bossDefeated=data.bossDefeated||false;
      if(data.scene&&data.scene!=='intro'){
        STATE.scene='hub';
        STATE.player.x=400;STATE.player.y=400;
      } else {
        STATE.scene='intro';
      }
      saveStatus.textContent='Partie chargée';
      saveStatus.style.color='#52c878';
      setTimeout(()=>{saveStatus.textContent='Progression sauvegardée';saveStatus.style.color='rgba(255,255,255,0.5)';},2000);
    } else {
      saveStatus.textContent='Nouvelle partie';
      saveStatus.style.color='rgba(255,255,255,0.5)';
    }
  }catch(err){
    saveStatus.textContent='Nouvelle partie';
  }
}

function resetGame(){
  if(!confirm('Vraiment recommencer depuis le début ? La sauvegarde sera effacée.'))return;
  try{localStorage.removeItem(SAVE_KEY);}catch(err){}
  STATE=DEFAULT_STATE();
  saveStatus.textContent='Partie réinitialisée';
  saveStatus.style.color='#f4c430';
  setTimeout(()=>{saveStatus.textContent='Nouvelle partie';saveStatus.style.color='rgba(255,255,255,0.5)';},2000);
  cv.focus();
}
resetBtn.addEventListener('click',resetGame);

// ---------- CONTRÔLES VIRTUELS ----------
const virtualInput = document.getElementById('virtual-input');
const enterBtn = document.getElementById('enter-btn');
const upBtn = document.getElementById('up-btn');
const downBtn = document.getElementById('down-btn');
const leftBtn = document.getElementById('left-btn');
const rightBtn = document.getElementById('right-btn');
const spaceBtn = document.getElementById('space-btn');
const spell1Btn = document.getElementById('spell1-btn');
const spell2Btn = document.getElementById('spell2-btn');
const spell3Btn = document.getElementById('spell3-btn');
const hubBtn = document.getElementById('hub-btn');
const escBtn = document.getElementById('esc-btn');

virtualInput.addEventListener('input', (e) => STATE.input = e.target.value);
enterBtn.addEventListener('click', () => { STATE.keys['Enter'] = true; setTimeout(() => STATE.keys['Enter'] = false, 100); });

function handleSpaceAction() {
  if(STATE.scene==='intro'){
    STATE.introStep++;
    if(STATE.introStep>=introTexts.length){
      STATE.scene='hub';
      STATE.player.x=400;STATE.player.y=400;
      showMessage('Marche vers la Forêt pour commencer !',180);
      scheduleSave();
    }
    return;
  }

  if(STATE.scene==='gameover'){
    STATE.scene='hub';
    STATE.player.hp=STATE.player.maxHp;
    STATE.player.x=400;STATE.player.y=400;
    STATE.combat=null;STATE.enemies=[];
    scheduleSave();
    return;
  }

  if(STATE.scene==='victory'){
    STATE.scene='hub';
    STATE.player.x=400;STATE.player.y=400;
    STATE.combat=null;STATE.enemies=[];
    scheduleSave();
    return;
  }

  if(STATE.scene==='hub'){
    if(STATE.nearSign==='boss'){startBoss();}
    else if(STATE.nearSign){enterLevel(STATE.nearSign);}
    return;
  }

  if(STATE.scene==='level'){
    const near=findNearestEnemy();
    if(near){startCombat(near);}
    return;
  }

  if(STATE.scene==='boss'){
    startCombat(STATE.finalBoss);
    return;
  }
}

function addTouchListeners(btn, key, onPress) {
  btn.addEventListener('touchstart', (e) => { e.preventDefault(); STATE.keys[key] = true; if(onPress) onPress(); });
  btn.addEventListener('touchend', (e) => { e.preventDefault(); STATE.keys[key] = false; });
  // Also add mouse for desktop
  btn.addEventListener('mousedown', (e) => { e.preventDefault(); STATE.keys[key] = true; if(onPress) onPress(); });
  btn.addEventListener('mouseup', () => STATE.keys[key] = false);
  btn.addEventListener('mouseleave', () => STATE.keys[key] = false);
}

addTouchListeners(upBtn, 'ArrowUp');
addTouchListeners(downBtn, 'ArrowDown');
addTouchListeners(leftBtn, 'ArrowLeft');
addTouchListeners(rightBtn, 'ArrowRight');
addTouchListeners(spaceBtn, ' ', handleSpaceAction);
addTouchListeners(spell1Btn, '1');
addTouchListeners(spell2Btn, '2');
addTouchListeners(spell3Btn, '3');
addTouchListeners(hubBtn, 'h');
addTouchListeners(escBtn, 'Escape');

// ---------- COULEURS ----------
const C={gold:'#f4c430',red:'#e24b4a',blue:'#5dade2',purple:'#9b6dd4',green:'#52c878',
fire:'#ff6b35',ice:'#7fdbff',lightning:'#ffe44d'};

// ---------- DESSIN PERSONNAGES ----------
function drawWizard(x,y,size,casting){
  const s=size||1;
  ctx.fillStyle='#4a3a8a';
  ctx.beginPath();ctx.moveTo(x-15*s,y+25*s);ctx.lineTo(x+15*s,y+25*s);ctx.lineTo(x+10*s,y+5*s);ctx.lineTo(x-10*s,y+5*s);ctx.closePath();ctx.fill();
  ctx.fillStyle='#f4c8a0';
  ctx.beginPath();ctx.arc(x,y-2*s,8*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e0e0e0';
  ctx.beginPath();ctx.moveTo(x-6*s,y+2*s);ctx.lineTo(x+6*s,y+2*s);ctx.lineTo(x+4*s,y+10*s);ctx.lineTo(x-4*s,y+10*s);ctx.closePath();ctx.fill();
  ctx.fillStyle='#3a2a6a';
  ctx.beginPath();ctx.moveTo(x-12*s,y-8*s);ctx.lineTo(x+12*s,y-8*s);ctx.lineTo(x+2*s,y-25*s);ctx.closePath();ctx.fill();
  ctx.fillStyle=C.gold;
  ctx.beginPath();ctx.arc(x-3*s,y-15*s,2*s,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#8b5a2b';ctx.lineWidth=2*s;
  ctx.beginPath();
  if(casting){ctx.moveTo(x+15*s,y+10*s);ctx.lineTo(x+25*s,y-15*s);}
  else{ctx.moveTo(x+12*s,y+15*s);ctx.lineTo(x+18*s,y-15*s);}
  ctx.stroke();
  ctx.fillStyle=casting?C.fire:C.blue;
  ctx.beginPath();
  if(casting){ctx.arc(x+25*s,y-15*s,4*s,0,Math.PI*2);}
  else{ctx.arc(x+18*s,y-15*s,3*s,0,Math.PI*2);}
  ctx.fill();
}

function drawSlime(x,y){
  ctx.fillStyle='#7fdb7f';
  ctx.beginPath();ctx.moveTo(x-20,y+15);
  ctx.quadraticCurveTo(x-20,y-15,x,y-15);
  ctx.quadraticCurveTo(x+20,y-15,x+20,y+15);
  ctx.closePath();ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(x-7,y-3,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+7,y-3,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(x-6,y-4,1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+8,y-4,1,0,Math.PI*2);ctx.fill();
}

function drawBird(x,y,t,frozen){
  const wing=frozen?0:Math.sin(t*0.2)*8;
  ctx.fillStyle='#8b4513';
  ctx.beginPath();ctx.ellipse(x,y,15,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#a0522d';
  ctx.beginPath();ctx.ellipse(x-8,y-wing,10,5,-0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+8,y-wing,10,5,0.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#8b4513';
  ctx.beginPath();ctx.arc(x+12,y-5,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=C.gold;
  ctx.beginPath();ctx.moveTo(x+18,y-5);ctx.lineTo(x+25,y-3);ctx.lineTo(x+18,y-1);ctx.closePath();ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(x+13,y-7,1.5,0,Math.PI*2);ctx.fill();
}

function drawSkeleton(x,y){
  ctx.fillStyle='#e8e8d8';
  ctx.fillRect(x-10,y,20,18);
  ctx.fillStyle='#000';
  for(let i=0;i<3;i++){ctx.fillRect(x-8,y+3+i*5,16,2);}
  ctx.fillStyle='#e8e8d8';
  ctx.beginPath();ctx.arc(x,y-8,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(x-4,y-9,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+4,y-9,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillRect(x-5,y-3,10,2);
  ctx.fillStyle='#e8e8d8';
  ctx.fillRect(x-15,y+2,4,12);
  ctx.fillRect(x+11,y+2,4,12);
}

function drawBat(x,y,t,frozen){
  const wing=frozen?0:Math.sin(t*0.3)*10;
  ctx.fillStyle='#3a1a4a';
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-25,y-wing);ctx.lineTo(x-15,y+5);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+25,y-wing);ctx.lineTo(x+15,y+5);ctx.closePath();ctx.fill();
  ctx.fillStyle='#5a2a6a';
  ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=C.red;
  ctx.beginPath();ctx.arc(x-3,y-2,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+3,y-2,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a1a4a';
  ctx.beginPath();ctx.moveTo(x-5,y-6);ctx.lineTo(x-3,y-12);ctx.lineTo(x-1,y-6);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x+1,y-6);ctx.lineTo(x+3,y-12);ctx.lineTo(x+5,y-6);ctx.closePath();ctx.fill();
}

function drawVampire(x,y){
  ctx.fillStyle='#3a0a0a';
  ctx.beginPath();ctx.moveTo(x-18,y+25);ctx.lineTo(x+18,y+25);ctx.lineTo(x+12,y);ctx.lineTo(x-12,y);ctx.closePath();ctx.fill();
  ctx.fillStyle='#1a1a2a';
  ctx.fillRect(x-8,y,16,20);
  ctx.fillStyle='#d8d8e8';
  ctx.beginPath();ctx.arc(x,y-8,9,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(x,y-12,9,Math.PI,Math.PI*2);ctx.fill();
  ctx.fillStyle=C.red;
  ctx.beginPath();ctx.arc(x-3,y-8,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+3,y-8,1.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.moveTo(x-2,y-3);ctx.lineTo(x-1,y);ctx.lineTo(x,y-3);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x,y-3);ctx.lineTo(x+1,y);ctx.lineTo(x+2,y-3);ctx.closePath();ctx.fill();
}

function drawOrc(x,y){
  ctx.fillStyle='#5a7a3a';
  ctx.fillRect(x-12,y,24,22);
  ctx.fillStyle='#6a8a4a';
  ctx.beginPath();ctx.arc(x,y-8,11,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=C.gold;
  ctx.beginPath();ctx.arc(x-4,y-9,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+4,y-9,2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(x-4,y-9,1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+4,y-9,1,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.moveTo(x-3,y-2);ctx.lineTo(x-4,y+3);ctx.lineTo(x-1,y-2);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x+3,y-2);ctx.lineTo(x+4,y+3);ctx.lineTo(x+1,y-2);ctx.closePath();ctx.fill();
  ctx.fillStyle='#5a7a3a';
  ctx.fillRect(x-18,y+2,6,15);
  ctx.fillRect(x+12,y+2,6,15);
  ctx.fillStyle='#6b3410';
  ctx.fillRect(x+15,y-5,4,15);
  ctx.beginPath();ctx.arc(x+17,y-5,5,0,Math.PI*2);ctx.fill();
}

function drawGoblin(x,y){
  ctx.fillStyle='#7aaa3a';
  ctx.fillRect(x-8,y,16,15);
  ctx.fillStyle='#8aba4a';
  ctx.beginPath();ctx.arc(x,y-6,10,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.moveTo(x-9,y-8);ctx.lineTo(x-15,y-12);ctx.lineTo(x-7,y-4);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x+9,y-8);ctx.lineTo(x+15,y-12);ctx.lineTo(x+7,y-4);ctx.closePath();ctx.fill();
  ctx.fillStyle=C.red;
  ctx.beginPath();ctx.arc(x-3,y-7,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+3,y-7,1.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#000';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(x,y-2,3,0,Math.PI);ctx.stroke();
  ctx.fillStyle='#999';
  ctx.beginPath();ctx.moveTo(x+10,y+5);ctx.lineTo(x+18,y);ctx.lineTo(x+10,y+8);ctx.closePath();ctx.fill();
}

function drawDragon(x,y,t){
  const wing=Math.sin(t*0.1)*15;
  ctx.fillStyle='#3a0a0a';
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-80,y-40-wing);ctx.lineTo(x-60,y);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+80,y-40-wing);ctx.lineTo(x+60,y);ctx.closePath();ctx.fill();
  ctx.fillStyle='#8a1a1a';
  ctx.beginPath();ctx.ellipse(x,y,40,25,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#a02a2a';
  ctx.beginPath();ctx.ellipse(x-40,y-10,20,15,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=C.gold;
  ctx.beginPath();ctx.arc(x-48,y-13,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(x-48,y-13,1.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#444';
  ctx.beginPath();ctx.moveTo(x-45,y-22);ctx.lineTo(x-40,y-35);ctx.lineTo(x-38,y-22);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(x-38,y-22);ctx.lineTo(x-32,y-32);ctx.lineTo(x-30,y-22);ctx.closePath();ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.moveTo(x-55,y-5);ctx.lineTo(x-53,y);ctx.lineTo(x-50,y-5);ctx.closePath();ctx.fill();
  ctx.fillStyle='#8a1a1a';
  ctx.beginPath();ctx.moveTo(x+30,y);ctx.quadraticCurveTo(x+70,y+20,x+90,y-10);ctx.lineTo(x+85,y-15);ctx.quadraticCurveTo(x+65,y+10,x+30,y-5);ctx.closePath();ctx.fill();
}

function drawEnemy(e,t){
  if(e.frozen>0){
    ctx.save();
    ctx.fillStyle='rgba(127,219,255,0.4)';
    ctx.beginPath();ctx.arc(e.x,e.y,28,0,Math.PI*2);ctx.fill();
  }
  if(e.flash>0){ctx.globalAlpha=0.5;}
  if(e.type==='slime')drawSlime(e.x,e.y);
  else if(e.type==='bird')drawBird(e.x,e.y,t,e.frozen>0);
  else if(e.type==='skeleton')drawSkeleton(e.x,e.y);
  else if(e.type==='bat')drawBat(e.x,e.y,t,e.frozen>0);
  else if(e.type==='vampire')drawVampire(e.x,e.y);
  else if(e.type==='orc')drawOrc(e.x,e.y);
  else if(e.type==='goblin')drawGoblin(e.x,e.y);
  ctx.globalAlpha=1;
  if(e.frozen>0){
    ctx.strokeStyle=C.ice;ctx.lineWidth=2;
    for(let i=0;i<6;i++){
      const a=i*Math.PI/3;
      ctx.beginPath();
      ctx.moveTo(e.x+Math.cos(a)*15,e.y+Math.sin(a)*15);
      ctx.lineTo(e.x+Math.cos(a)*22,e.y+Math.sin(a)*22);
      ctx.stroke();
    }
    ctx.restore();
  }
  if(e.flying && e.frozen<=0){
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.beginPath();ctx.ellipse(e.x,e.y+22,18,4,0,0,Math.PI*2);ctx.fill();
  }
  const w=30;
  ctx.fillStyle='#400';ctx.fillRect(e.x-w/2,e.y-25,w,4);
  ctx.fillStyle=C.red;ctx.fillRect(e.x-w/2,e.y-25,w*(e.hp/e.maxHp),4);
  if(e.flying && e.frozen<=0){
    ctx.fillStyle=C.ice;ctx.font='bold 14px sans-serif';ctx.textAlign='center';
    ctx.fillText('❄',e.x,e.y-30);
  }
}

    ctx.fillStyle='#2a5a2a';ctx.beginPath();ctx.arc(x-8,y-15,15,0,Math.PI*2);ctx.fill();

function drawCastle(t){
  ctx.fillStyle='#1a1428';ctx.fillRect(0,0,800,500);
  ctx.fillStyle='#3d3550';ctx.fillRect(0,250,800,250);
  ctx.strokeStyle='#2a2438';ctx.lineWidth=2;
  for(let y=270;y<500;y+=30){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(800,y);ctx.stroke();
    for(let x=(y%60===0?0:30);x<800;x+=60){
      ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x,y+30);ctx.stroke();
    }
  }
  for(let i=0;i<4;i++){
    const x=i*220+80;
    ctx.fillStyle='#5d5570';ctx.fillRect(x-15,100,30,200);
    ctx.fillStyle='#7d7590';ctx.fillRect(x-20,100,40,15);

function drawMountain(t){

// ---------- PARTICULES ----------
function addParticles(x,y,color,count){
  count=count||15;
  for(let i=0;i<count;i++){
    STATE.particles.push({x,y,vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,life:30,color});
  }
}
function updateParticles(){
  STATE.particles=STATE.particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life--;
    return p.life>0;
  });
}
function drawParticles(){
  STATE.particles.forEach(p=>{
    ctx.globalAlpha=p.life/30;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

// ---------- NIVEAUX ----------
const ENEMY_DEFS={
  slime:{flying:false},
  bird:{flying:true},
  skeleton:{flying:false},
  bat:{flying:true},
  vampire:{flying:false},
  orc:{flying:false,resistant:true},
  goblin:{flying:false,resistant:true}
};

const LEVELS={
  foret:{bg:drawForest,hpRange:[1,2],killGoal:10,
    getEnemyTypes:()=>STATE.spells.includes('glace')?['slime','bird','slime']:['slime']},
  chateau:{bg:drawCastle,hpRange:[3,4],killGoal:10,
    getEnemyTypes:()=>STATE.spells.includes('glace')?['skeleton','bat','vampire']:['skeleton','vampire']},
  montagne:{bg:drawMountain,hpRange:[5,6],killGoal:10,
    getEnemyTypes:()=>['orc','goblin']}
};

function enterLevel(key){
  STATE.currentLevel=key;
  STATE.scene='level';
  STATE.player.x=100;STATE.player.y=400;
  spawnEnemies();
  scheduleSave();
}

function spawnEnemies(){
  STATE.enemies=[];
  const lvl=LEVELS[STATE.currentLevel];
  const types=lvl.getEnemyTypes();
  const count=4;
  for(let i=0;i<count;i++){
    const type=types[Math.floor(Math.random()*types.length)];
    const def=ENEMY_DEFS[type];
    const hp=lvl.hpRange[0]+Math.floor(Math.random()*(lvl.hpRange[1]-lvl.hpRange[0]+1));
    const flying=def.flying;
    STATE.enemies.push({
      type,hp,maxHp:hp,
      x:300+i*120+Math.random()*40,
      y:flying?(180+Math.random()*60):(320+Math.random()*80),
      flash:0,frozen:0,
      flying,
      resistant:def.resistant||false,
      baseY:flying?(180+Math.random()*60):0,
      floatPhase:Math.random()*Math.PI*2
    });
  }
}

function drawLevel(){
  const lvl=LEVELS[STATE.currentLevel];
  lvl.bg(STATE.player.anim);

  STATE.enemies.forEach(e=>{
    if(e.flying && e.frozen<=0){
      e.y=e.baseY+Math.sin(STATE.player.anim*0.05+e.floatPhase)*15;
    }
    if(e.frozen>0)e.frozen--;
  });

  STATE.enemies.forEach(e=>{
    drawEnemy(e,STATE.player.anim);
    if(e.flash>0)e.flash--;
  });

  drawParticles();
  drawWizard(STATE.player.x,STATE.player.y,1,STATE.combat!==null);

  if(!STATE.combat){
    const near=findNearestEnemy();
    if(near){
      ctx.fillStyle='rgba(244,196,48,0.9)';
      ctx.fillRect(near.x-50,near.y-50,100,20);
      ctx.fillStyle='#000';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
      ctx.fillText('Espace pour combattre',near.x,near.y-35);
    }
  }

  drawHUD();

  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(580,10,210,30);
  ctx.fillStyle=C.gold;ctx.font='bold 14px sans-serif';ctx.textAlign='left';
  ctx.fillText('Monstres : '+STATE.killsByLevel[STATE.currentLevel]+'/'+lvl.killGoal,590,30);

  if(STATE.killsByLevel[STATE.currentLevel]>=lvl.killGoal){
    ctx.fillStyle='rgba(82,200,120,0.9)';
    ctx.fillRect(250,75,300,25);
    ctx.fillStyle='#000';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    ctx.fillText('Niveau terminé ! Appuie sur H pour revenir',400,92);
  }

  if(STATE.combat){drawCombat();}
}

function findNearestEnemy(){
  let near=null,minD=80;
  STATE.enemies.forEach(e=>{
    const dist=e.flying && e.frozen<=0?60:80;
    const d=Math.hypot(e.x-STATE.player.x,e.y-STATE.player.y);
    if(d<dist && d<minD){minD=d;near=e;}
  });
  return near;
}

// ---------- COMBAT ----------
function startCombat(enemy){
  STATE.combat={enemy,spell:'feu',op:null,input:'',feedback:'',feedbackTime:0,locked:false};
  if(enemy.flying && enemy.frozen<=0 && STATE.spells.includes('glace')){
    STATE.combat.spell='glace';
    STATE.combat.locked='must_freeze';
  }
  generateOp(STATE.combat.spell);
}

function generateOp(spell){
  let a,b,result,sym;
  if(spell==='feu'){
    a=Math.floor(Math.random()*51);
    b=Math.floor(Math.random()*(101-a));
    result=a+b;sym='+';
  } else if(spell==='glace'){
    a=Math.floor(Math.random()*101);
    b=Math.floor(Math.random()*(a+1));
    result=a-b;sym='−';
  } else {
    a=1+Math.floor(Math.random()*10);
    b=1+Math.floor(Math.random()*10);
    result=a*b;sym='×';
  }
  STATE.combat.op={a,b,result,sym};
  STATE.combat.input='';
}

function drawCombat(){
  ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,800,500);
  const c=STATE.combat;
  ctx.fillStyle='#1a1428';
  ctx.fillRect(80,60,640,380);
  ctx.strokeStyle=C.gold;ctx.lineWidth=3;
  ctx.strokeRect(80,60,640,380);

  ctx.fillStyle=C.gold;ctx.font='bold 22px serif';ctx.textAlign='center';
  ctx.fillText('⚔ Combat ⚔',400,95);

  ctx.save();
  ctx.translate(400,180);ctx.scale(2.5,2.5);ctx.translate(-400,-180);
  drawEnemy({...c.enemy,x:400,y:180,flash:0,frozen:c.enemy.frozen},STATE.player.anim);
  ctx.restore();

  if(c.locked==='must_freeze'){
    ctx.fillStyle=C.ice;ctx.font='bold 14px sans-serif';
    ctx.fillText('Cet ennemi vole ! Gèle-le d\'abord avec la Glace ❄',400,250);
  }
  if(c.enemy.resistant && c.spell!=='foudre' && STATE.spells.includes('foudre')){
    ctx.fillStyle=C.lightning;ctx.font='bold 12px sans-serif';
    ctx.fillText('⚡ Cet ennemi résiste : la Foudre fait plus de dégâts !',400,265);
  }

  ctx.fillStyle='#fff';ctx.font='13px sans-serif';
  ctx.fillText('Sort : appuie sur 1, 2 ou 3',400,285);

  const spells=[
    {key:'1',name:'Feu',spell:'feu',color:C.fire,dmg:1,op:'+'},
    {key:'2',name:'Glace',spell:'glace',color:C.ice,dmg:2,op:'−'},
    {key:'3',name:'Foudre',spell:'foudre',color:C.lightning,dmg:3,op:'×'}
  ];
  spells.forEach((s,i)=>{
    const x=200+i*200;
    const unlocked=STATE.spells.includes(s.spell);
    const active=c.spell===s.spell;
    const disabled=c.locked==='must_freeze' && s.spell!=='glace';
    ctx.fillStyle=disabled?'#222':(unlocked?(active?s.color:'rgba(255,255,255,0.1)'):'#333');
    ctx.fillRect(x-60,295,120,40);
    ctx.strokeStyle=active?'#fff':(unlocked?s.color:'#555');ctx.lineWidth=2;
    ctx.strokeRect(x-60,295,120,40);
    ctx.fillStyle=disabled?'#555':(unlocked?(active?'#000':'#fff'):'#777');
    ctx.font='bold 14px sans-serif';
    ctx.fillText('['+s.key+'] '+s.name,x,313);
    ctx.font='11px sans-serif';
    ctx.fillText(s.dmg+' dégât'+(s.dmg>1?'s':'')+'  '+s.op,x,328);
    if(!unlocked){ctx.fillStyle=C.red;ctx.fillText('🔒',x+45,310);}
  });

  if(c.op){
    ctx.fillStyle=c.spell==='feu'?C.fire:c.spell==='glace'?C.ice:C.lightning;
    ctx.font='bold 48px serif';ctx.textAlign='center';
    ctx.fillText(c.op.a+' '+c.op.sym+' '+c.op.b+' = ?',400,380);
  }

  ctx.fillStyle='#fff';ctx.fillRect(340,395,120,30);
  ctx.fillStyle='#000';ctx.font='bold 22px sans-serif';
  ctx.fillText(c.input||'_',400,417);

  if(c.feedback){
    ctx.fillStyle=c.feedback.indexOf('✓')>=0?C.green:C.red;
    ctx.font='bold 18px sans-serif';
    ctx.fillText(c.feedback,400,75);
  }

  ctx.fillStyle='#aaa';ctx.font='11px sans-serif';
  ctx.fillText('Tape ta réponse puis Entrée · Échap pour fuir',400,432);
}

function submitAnswer(){
  const c=STATE.combat;
  if(!c||!c.op||c.input==='')return;
  const ans=parseInt(c.input,10);
  if(ans===c.op.result){
    let dmg=c.spell==='feu'?1:c.spell==='glace'?2:3;
    if(c.enemy.resistant && c.spell!=='foudre'){
      dmg=Math.max(1,Math.floor(dmg/2));
    }
    if(c.spell==='glace' && c.enemy.flying){
      c.enemy.frozen=300;
    }
    c.enemy.hp-=dmg;c.enemy.flash=10;
    addParticles(c.enemy.x,c.enemy.y,c.spell==='feu'?C.fire:c.spell==='glace'?C.ice:C.lightning,20);
    let msg='✓ Correct ! '+dmg+' dégât'+(dmg>1?'s':'')+' !';
    if(c.enemy.resistant && c.spell!=='foudre' && STATE.spells.includes('foudre'))msg+=' (résistance)';
    if(c.spell==='glace' && c.enemy.flying)msg+=' Gelé ❄';
    c.feedback=msg;
    c.feedbackTime=40;

    if(c.locked==='must_freeze' && c.spell==='glace'){
      c.locked=false;
    }

    if(c.enemy.hp<=0){
      addParticles(c.enemy.x,c.enemy.y,C.gold,30);
      STATE.enemies=STATE.enemies.filter(e=>e!==c.enemy);
      if(STATE.scene==='boss'){
        STATE.scene='victory';
        STATE.bossDefeated=true;
        STATE.combat=null;
        scheduleSave();
        return;
      }
      STATE.killsByLevel[STATE.currentLevel]++;

      const lvl=LEVELS[STATE.currentLevel];
      if(STATE.killsByLevel[STATE.currentLevel]>=lvl.killGoal && !STATE.levelProgress[STATE.currentLevel]){
        STATE.levelProgress[STATE.currentLevel]=true;
        if(STATE.currentLevel==='foret' && !STATE.spells.includes('glace')){
          STATE.spells.push('glace');
          showMessage('★ Sort de Glace débloqué ! ★',180);
        } else if(STATE.currentLevel==='chateau' && !STATE.spells.includes('foudre')){
          STATE.spells.push('foudre');
          showMessage('★ Sort de Foudre débloqué ! ★',180);
        } else {
          showMessage('★ Niveau terminé ! ★',180);
        }
      }

      STATE.combat=null;
      scheduleSave();
      if(STATE.enemies.length===0)spawnEnemies();
    } else {
      setTimeout(function(){if(STATE.combat)generateOp(STATE.combat.spell);},800);
    }
  } else {
    STATE.player.hp--;
    c.feedback='✗ Faux ! La réponse était '+c.op.result;
    c.feedbackTime=60;
    addParticles(STATE.player.x,STATE.player.y,C.red,15);
    scheduleSave();
    if(STATE.player.hp<=0){
      STATE.scene='gameover';
      STATE.combat=null;
      return;
    }
    setTimeout(function(){if(STATE.combat)generateOp(STATE.combat.spell);},1200);
  }
  c.input='';
}

// ---------- HUD ----------
function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(10,10,200,30);
  ctx.fillStyle=C.red;
  ctx.fillRect(15,15,190*(STATE.player.hp/STATE.player.maxHp),20);
  ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(15,15,190,20);
  ctx.fillStyle='#fff';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
  ctx.fillText('HP : '+STATE.player.hp+'/'+STATE.player.maxHp,110,30);

  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(10,45,200,30);
  ctx.fillStyle='#fff';ctx.font='12px sans-serif';ctx.textAlign='left';
  ctx.fillText('Sorts :',20,65);
  const spellList=[{n:'Feu',c:C.fire,k:'feu'},{n:'Glace',c:C.ice,k:'glace'},{n:'Foudre',c:C.lightning,k:'foudre'}];
  spellList.forEach((s,i)=>{
    const has=STATE.spells.includes(s.k);
    ctx.fillStyle=has?s.c:'#444';
    ctx.beginPath();ctx.arc(80+i*40,60,10,0,Math.PI*2);ctx.fill();
    if(!has){ctx.fillStyle='#888';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('?',80+i*40,64);}
  });

  if(STATE.messageTime>0){
    ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(150,90,500,40);
    ctx.fillStyle=C.gold;ctx.font='bold 18px serif';ctx.textAlign='center';
    ctx.fillText(STATE.message,400,115);
    STATE.messageTime--;
  }
}

function showMessage(m,t){STATE.message=m;STATE.messageTime=t||120;}

// ---------- BOSS ----------
function startBoss(){
  STATE.scene='boss';
  STATE.player.x=200;STATE.player.y=350;
  STATE.finalBoss={hp:15,maxHp:15,x:600,y:250,type:'dragon',flash:0,frozen:0,flying:false,resistant:false};
  STATE.enemies=[];
}

function drawBoss(){
  const grd=ctx.createLinearGradient(0,0,0,500);
  grd.addColorStop(0,'#1a0a1a');grd.addColorStop(1,'#3a0a1a');
  ctx.fillStyle=grd;ctx.fillRect(0,0,800,500);
  drawDragon(STATE.finalBoss.x,STATE.finalBoss.y,STATE.player.anim);
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(200,440,400,40);
  ctx.fillStyle=C.red;ctx.fillRect(205,445,390*(STATE.finalBoss.hp/STATE.finalBoss.maxHp),30);
  ctx.fillStyle='#fff';ctx.font='bold 16px serif';ctx.textAlign='center';
  ctx.fillText('Dragon Gardien : '+STATE.finalBoss.hp+'/'+STATE.finalBoss.maxHp,400,465);
  drawParticles();
  drawWizard(STATE.player.x,STATE.player.y,1,STATE.combat!==null);
  if(!STATE.combat){
    ctx.fillStyle='rgba(244,196,48,0.9)';ctx.fillRect(300,90,200,30);
    ctx.fillStyle='#000';ctx.font='bold 14px sans-serif';ctx.textAlign='center';
    ctx.fillText('Espace pour attaquer !',400,110);
  }
  drawHUD();
  if(STATE.combat){drawCombat();}
}

// ---------- VICTOIRE / GAME OVER ----------
function drawVictory(){
  ctx.fillStyle='#0a0a2a';ctx.fillRect(0,0,800,500);
  for(let i=0;i<50;i++){
    const x=(i*73)%800,y=(i*47)%500;
    ctx.fillStyle='#fff';ctx.globalAlpha=0.3+Math.sin(STATE.player.anim*0.05+i)*0.5;
    ctx.fillRect(x,y,2,2);
  }
  ctx.globalAlpha=1;
  ctx.fillStyle=C.gold;
  ctx.globalAlpha=0.3+Math.sin(STATE.player.anim*0.1)*0.2;
  ctx.beginPath();ctx.arc(400,200,80,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle='#5a2a1a';ctx.fillRect(360,170,80,60);
  ctx.fillStyle=C.gold;ctx.fillRect(370,180,60,40);
  ctx.fillStyle='#5a2a1a';ctx.font='bold 30px serif';ctx.textAlign='center';
  ctx.fillText('★',400,210);
  ctx.fillStyle=C.gold;ctx.font='bold 48px serif';ctx.textAlign='center';
  ctx.fillText('VICTOIRE !',400,320);
  ctx.fillStyle='#fff';ctx.font='20px serif';
  ctx.fillText('Eldrin a obtenu le Grimoire Sacré !',400,360);
  ctx.font='16px sans-serif';
  ctx.fillText('Espace pour retourner au hub',400,420);
}

function drawGameOver(){
  ctx.fillStyle='#1a0a0a';ctx.fillRect(0,0,800,500);
  ctx.fillStyle=C.red;ctx.font='bold 64px serif';ctx.textAlign='center';
  ctx.fillText('Game Over',400,200);
  ctx.fillStyle='#fff';ctx.font='20px serif';
  ctx.fillText('Eldrin est tombé...',400,260);
  ctx.font='16px sans-serif';
  ctx.fillText('Mais ta progression est sauvegardée !',400,300);
  ctx.fillStyle=C.gold;
  ctx.fillText('Espace pour retourner au hub',400,360);
}

// ---------- BOUCLE ----------
function update(){
  STATE.player.anim++;
  updateParticles();
  if(STATE.combat&&STATE.combat.feedbackTime>0){
    STATE.combat.feedbackTime--;
    if(STATE.combat.feedbackTime===0)STATE.combat.feedback='';
  }
  if((STATE.scene==='hub'||STATE.scene==='level'||STATE.scene==='boss')&&!STATE.combat){
    const sp=3;
    if(STATE.keys['ArrowLeft'])STATE.player.x-=sp;
    if(STATE.keys['ArrowRight'])STATE.player.x+=sp;
    if(STATE.keys['ArrowUp'])STATE.player.y-=sp;
    if(STATE.keys['ArrowDown'])STATE.player.y+=sp;
    STATE.player.x=Math.max(20,Math.min(780,STATE.player.x));
    STATE.player.y=Math.max(150,Math.min(470,STATE.player.y));
  }
}

function render(){
  ctx.clearRect(0,0,800,500);
  if(STATE.scene==='intro')drawIntro();
  else if(STATE.scene==='hub')drawHub();
  else if(STATE.scene==='level')drawLevel();
  else if(STATE.scene==='boss')drawBoss();
  else if(STATE.scene==='victory')drawVictory();
  else if(STATE.scene==='gameover')drawGameOver();
}

function loop(){update();render();requestAnimationFrame(loop);}

// ---------- ENTRÉES ----------
window.addEventListener('keydown',e=>{
  STATE.keys[e.key]=true;

  if(STATE.scene==='intro'){
    if(e.key===' '){
      STATE.introStep++;
      if(STATE.introStep>=introTexts.length){
        STATE.scene='hub';STATE.player.x=400;STATE.player.y=400;
        showMessage('Marche vers la Forêt pour commencer !',180);
        scheduleSave();
      }
      e.preventDefault();
    }
    return;
  }

  if(STATE.scene==='gameover'){
    if(e.key===' '){
      STATE.scene='hub';
      STATE.player.hp=STATE.player.maxHp;
      STATE.player.x=400;STATE.player.y=400;
      STATE.combat=null;STATE.enemies=[];
      scheduleSave();
    }
    return;
  }

  if(STATE.scene==='victory'){
    if(e.key===' '){
      STATE.scene='hub';
      STATE.player.x=400;STATE.player.y=400;
      STATE.combat=null;STATE.enemies=[];
      scheduleSave();
    }
    return;
  }

  if(STATE.combat){
    if(e.key>='0'&&e.key<='9'){
      if(STATE.combat.input.length<3)STATE.combat.input+=e.key;
      e.preventDefault();
    } else if(e.key==='Backspace'){
      STATE.combat.input=STATE.combat.input.slice(0,-1);
      e.preventDefault();
    } else if(e.key==='Enter'){
      submitAnswer();
      e.preventDefault();
    } else if(e.key==='Escape'){
      STATE.combat=null;
      e.preventDefault();
    } else if(e.key==='1' && STATE.spells.includes('feu') && STATE.combat.locked!=='must_freeze'){
      STATE.combat.spell='feu';generateOp('feu');
    } else if(e.key==='2' && STATE.spells.includes('glace')){
      STATE.combat.spell='glace';generateOp('glace');
    } else if(e.key==='3' && STATE.spells.includes('foudre') && STATE.combat.locked!=='must_freeze'){
      STATE.combat.spell='foudre';generateOp('foudre');
    }
    return;
  }

  if(e.key===' '){
    if(STATE.scene==='hub'){
      if(STATE.nearSign==='boss'){startBoss();}
      else if(STATE.nearSign){enterLevel(STATE.nearSign);}
      e.preventDefault();
    } else if(STATE.scene==='level'){
      const near=findNearestEnemy();
      if(near){startCombat(near);}
      e.preventDefault();
    } else if(STATE.scene==='boss'){
      startCombat(STATE.finalBoss);
      e.preventDefault();
    }
  }

  if(e.key==='h'||e.key==='H'){
    if(STATE.scene==='level'){
      STATE.scene='hub';STATE.player.x=400;STATE.player.y=400;STATE.combat=null;
      scheduleSave();
    }
  }
});

window.addEventListener('keyup',e=>{STATE.keys[e.key]=false;});

// Démarrage
loadGame();
loop();
})();
</script>
